{% extends 'base.html' %}

{% block content %}

<h2>
    Product List
</h2>

<hr>

{% for product in products %}

    <div class="card p-3 mb-3">

        <h4>
            {{ product.name }}
        </h4>

        <p>
            Price: {{ product.price }}
        </p>

        <p>
            Branch: {{ product.branch }}
        </p>

    </div>

{% empty %}

    <h4>
        No Products Found
    </h4>

{% endfor %}

{% endblock %}
